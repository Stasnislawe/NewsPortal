<!DOCTYPE html>
{% load cache %}
{% load i18n %}
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>News Portal - Новостной портал</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        {% load static %}
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    </head>
    <body>
        <!-- Responsive navbar-- <button> <a href="sign/logout/">Выйти</a> </button> -->
        {% cache 60 header %}
            {% block header %}
                <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                    <div class="container">
                        <a class="navbar-brand" href="">Portal News</a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                        <div class="collapse navbar-collapse" id="navbarSupportedContent">
                            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                                <li class="nav-item"><a class="nav-link active" aria-current="page" href="/newsportal/">Главная Страница</a></li>
                                <li class="nav-item"><a class="nav-link active" aria-current="page" href="/sign/index/">Личный Кабинет</a></li>
                                <li class="nav-item"><a class="nav-link" href="/newsportal/news/create/">Создание новости</a></li>
                                <li class="nav-item"><a class="nav-link" href="/newsportal/article/create/">Создание статьи</a></li>
                            </ul>
                        </div>
                    </div>
                </nav>
            {% endblock header %}
        {% endcache %}
        <div class="container">
            <div class="text-center nt-5">
                {% block content %}
                {% endblock content %}
            </div>
        </div>
    </body>
</html>
